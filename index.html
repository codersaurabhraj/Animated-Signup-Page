<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/d22de76062.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="box-container">
        <h2>SIGNUP Form</h2>
        <form action="">
            <div class="form-group">
                <input type="text" required>
                <label for="">First Name</label><i class="fa-solid fa-user"></i>
            </div>

            <div class="form-group">
                <input type="text" required>
                <label for="">Last Name</label><i class="fa-solid fa-user"></i>
            </div>

            <div class="form-group">
                <input type="email" required>
                <label for="">Email</label><i class="fa-solid fa-envelope"></i>
            </div>

            <div class="form-group">
                <input type="password" required>
                <label for="">Passowrd</label><i class="fa-solid fa-lock"></i>
            </div>

            <div class="form-group">
                <input type="password" required>
                <label for="">Confirm Passowrd</label><i class="fa-solid fa-lock"></i>
            </div>

            <div class="gender">
                <label class="gender">Gender</label>
                <input type="radio" name="gender" value="Male" class="gender">Male
                <input type="radio" name="gender" value="Female" class="gender">Female
                <input type="radio" name="gender" value="Others" class="gender">Others
            </div>


            <div class="form-group">
                <select class="country">
                    <option>Select a Country </option>
                    <option>India</option>
                    <option>United States</option>
                    <option>United Kingdom</option>
                    <option>Canada</option>
                    <option>Australia</option>
                    <option>Germany</option>
                    <option>France</option>
                    <option>Japan</option>
                    <option>China</option>
                    <option>Brazil</option>
                </select>
            </div>

            <p class="para"><input type="checkbox">I accept the term & condition</p>

            <button id="btn">Signup</button>
        </form>
    </div>
</body>

</html>
